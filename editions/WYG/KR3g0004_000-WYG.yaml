body:
  text: 潛虚術數類一數學之屬提要臣等謹案潛虚一卷附潛虚發微論一卷宋司馬光撰光有書儀諸書已著録是編乃擬太元而作晁公武讀書志曰此書以五行為本五行相乗為二十五兩之為五十首有氣體性名行度解七圖然其辭有闕者葢未成也其手寫草稿一通今在子建姪房朱子跋張氏潛虚圖亦曰范仲彪炳文家多藏司馬文正公遺墨嘗示予潛虚别本則其所闕之文甚多問之云温公晚著此書未竟而薨故所傳止此近見泉州所刻乃無一字之闕始復驚疑讀至數行乃釋然曰此贋本也其説與公武合此本首尾完具當即朱子所謂泉州本非光之舊又公武言氣體性名行變解七圖熊朋來則言潛虚有氣圖其次體圖其次性圖其次名圖其次行圖其次命圖其目凡六而張氏或言八圖者行圖中有變圖解圖也是命圖為後人所補公武言五行相乗為二十五兩之為五十首而今本實五十五行是其中五行亦後人所補不止増其文句已也吳師道禮部集有此書後序稱初得潛虚全本又得孫氏闕本續又得許氏闕本歸以㕘校用朱子法非其舊者悉以朱圏别之然其本今亦不傳林希逸嘗作潛虚精語一卷今尚載鬳齋十一稿中凡所存者皆闕本之語而續者不載尚可略見大槩然于闕本中亦不全取究無以知某條為贋本葢世無原書久矣姑以原出于光而存之耳陳淳譏其所謂虛者不免于老氏之歸要其吉臧平否凶之占以氣之過不及為斷亦不失乎聖賢之㫖也張敦實論凡十篇據吳師道後序則元時已附刻于後今亦併存之敦實婺源人官左朝奉郎監察御史其始末無考考太元經末有右迪功郎充浙江提舉鹽茶司幹辧公事張實校勘字疑即一人或南宋避寧宗諱重刻太元經時刪去敦字歟是不可得而詳矣乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書潛虚宋司馬光撰萬物皆祖於虚生於氣氣以成體體以受性性以辨名名以立行行以俟命故虚者物之府也氣者生之户也體者質之具也性者神之賦也名者事之分也行者人之務也命者時之遇也一等象王二等象公三等象岳四等象牧五等象率六等象侯七等象卿八等象大夫九等象士十等象庶人一以治萬少以制衆其維綱紀乎綱紀立而治具成矣心使身身使臂臂使指指操萬物或者不為之使則治道病矣卿詘一大夫詘二士詘三庶人詘四位愈卑詘愈多所以為順也詘雖多不及半所以為正也正順䒶墬之大誼也性圖水火木金土水火木金十十土丨火木金土丅水丅火木金十土丨十水丨木金土丅水火丅木金十土丨水十火丨金土丅水火木丅金十土丨水火十木丨土丅水火木金十丅土丨水火木十金丅丨水火木金十土凡性之序先列十純十純既洽其次降一其次降二其次降三其次降四最後五配而性備矣始於純終於配天地之道也一六置後二七置前三八置左四九置右通以五十五行叶序卬而瞻之宿躔從度卬則為䒶頫則為墬卬得五宫頫得十數元餘者物之始終故無變齊者中也包斡萬物故無位臭至之氣起於元轉而周三百六十四變變尸一日廼授於餘而終之以步䒶軌以叶歳紀人之生本於虚然後形形然後性性然後動動然後情情然後事事然後徳徳然後家家然後國國然後政政然後功功然後業業終則返於虚矣故萬物始於元著於裒蒲侯存於齊消於散訖於餘五者形之運也柔剛雍昧昭性之分也容言慮聆覿動之官也繇懠牋西得罹耽情之訹恤也郤庸妥吐火蠢尺尹事之變也訒刃宜忱喆戞徳之塗也特偶暱續考家之綱也范徒醜隸林國之紀也禋因凖資賔􅞯政之務也斆傚乂續育聲功之具也興痡鋪泯造隆業之著也為人上者將何為哉養之教之理之而已養之故人賴以生也教之故人賴以明也治之故人賴以乂也夫如是故人愛之如父母信之如卜筮畏之如雷霆是以功成而名自立也夫為人上而不能養則人離叛矣養而不能教則人殽亂矣教而不能治則人抵捍矣三具者亡而祈有功名可得乎釋音卬魚兩切䒶古文天字頫說文音俯墬籕文地字􅆨古文冬字古文後字􅞯戎
