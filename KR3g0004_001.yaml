body:
  text: 宋太師温國公司馬光撰萬物皆祖於虚生於氣氣以成體體以受性性以辨名名以立行行以俟命故虚者物之府也氣者生之戸也體者質之具也性者神之賦也名者事之分也行者人之務也命者時之遇也一等象王二等象公三等象岳四等象牧五等象率六等象侯七等象卿八等象大夫九等象士十等象庶人一以治萬少以制衆其惟綱紀乎綱紀立而治具成矣心使身身使臂臂使指指操萬物或者不為之使則治道病矣卿詘一大夫詘二士詘三庶人詘四位愈卑詘愈多所以為順也詘雖多不及半所以為正也正順䒶墜之大誼也一六置後二七置前三八置左四九置右通以五十五行叶序卬而瞻之宿躔從度卬則為䒶頫則為墬卬得五宫頫得十數元餘者物之始終故無變齊者中也包斡萬物故無位至之氣起於元轉而周三百六十四變變尸一日廼授扵餘而終之以歩䒶軌以叶歲紀人之生本於虚然逡形形然逡性性然逡動動然後情情然後事事然後徳徳然後家家然逡國國然逡政政然逡功功然逡業業終則返於虚矣故萬物始於元著於裒蒲侯存於齊消於散訖於餘五者形之運也柔剛雍昩昭性之分也容言慮聆覿動之官也繇懠牋西得罹耽都含情之訹恤也歬郤庸妥吐火蠢尺尹事之變也訒刄冝忱喆戞徳之塗也特偶䁥續考家之綱也范徒醜隷林國之紀也禋因凖資賔􅞯政之務也斆俲理績育聲功之具也興痡鋪泯造隆業之著也為人上者將何為哉飬之教之理之而已飬之故人頼以生也教之故人頼以明也治之故人頼以乂也夫人是故人愛之如父母信之如卜筮畏之如雷霆是以功成而名白也夫為人上而不能飬則人離叛矣飬而不䏻教則人殽亂矣教而不能治則人抵捍矣三具者亡而祈有功者可得乎釋音卬魚兩切䒶古文天字頫說文音俯墬籕文地字折古文冬字逡古文後字􅞯戎五行相乗得二十五又以三才乗之得七十五以為䇿虚其五而用七十分而為二取左之一以掛於右揲左以十而觀其餘置而扐之復合為一而再分之掛揲其右皆如左法左為主右為客先主後客者陽先客後主者隂觀其所合以名命之既得其名又合蓍而復分之陽則置右而揲左隂則置左而揲右生純置右成純置左揲之以七所揲之餘爲所得之變觀其吉凶臧否平而决之陽則用其顯隂則用其幽幽者吉凶臧否與顯戾也欲知始終中者以所筮之時占之先體爲始後體爲中所得之變爲終變已主其大矣又有吉凶臧否平者於變之中復爲細别也不信不筮不疑不筮不正不筮不順不筮不蠲不筮不誠不筮必蠲必誠神靈是聴玄以凖易虚以擬玄玄且覆瓿而况虚乎其棄必矣然子雲曰後世復有楊子雲必知玄吾於子雲雖未䏻知固好之矣安知後世復無司馬君實乎潛虚發㣲論左朝奉郎監察御史張敦實撰潛虚總論有物混成先天地生強而名之是為道太極元氣函三為一衍而伸之是為數兩儀之所以奠位萬類之所以成形天下國家之所以致治悉不外乎道與數聖人筆而載之是為易子雲作太玄所以明易也温公作潛虚所以明元也易之作出扵不得已元虚之作豈亦出扵不得已乎自雄之作元議者已紛然矣獨有扵虚乎曰易者經之原也其道奥而難知温公固嘗云易天也元者所以為之階也將升天而可廢其階乎又嘗譬之扶大厦者資衆木明大道者資衆說蓋非特元論亦虚論也學者由虚而曉元由元而究易斯無躐等之患而有漸進之益矣是豈得已而不已哉抑又以温公平生著述論之其考前古興衰得失之迹作為通鑑自潛虚視之則筆學也留心太元三十年既集諸說而為註又作濳虚之書自通鑑視之則心學也今世扵筆力之所及者家傳人誦無間四夷至扵心思之所及則見者不傳傳者不習誠可恠也豈後世之子雲扵温公見之後世之温公自有時乎敦實自㓜得潛虚藁本於其裔孫伋首尾多闕尋訪數年始得全文初若聱牙漫漶不可測識深思熟讀乃知立辭命意左右前後横斜曲直皆有成理因即其圖各為總論庶㡬學者易覽少見温公之用心焉雖然詩三百篇而聖人蔽之以一言若道極扵㣲妙而不見於日用之間則亦何貴於道哉是故易之所謂人道者不過乎仁義元之所謂大訓者不過乎忠孝虚之所謂人之務者不過乎五十五行仰而推之以配三百六十五度日月不䏻越一度以周天人不䏻越一行以全徳兹又述作之深意也學者以是求之思過半矣若夫大衍五行律暦之至數又何患其難知焉元以凖易虚以擬元論切觀元之凖易虚之擬元非謂卦爻象數求以相合也反覆其序軫轉其道雖若與之相戾而終實與之為表裏者乃所以為有得也故易之為卦六十有四而元之首則八十有一虚之名則五十有五易之爻有六元之賛則有九虚之變則有七易之卦有内外元之首有四位虚之體有十等易有八物元配五行虚則兼之以生成之數易始於乾元則始於中虚則始於元也易終於未濟元則終於飬虚則終於餘也易之蓍䇿用四十有九元之蓍䇿用三十有三虚之蓍䇿用七十易之揲也以四元之揲也以三虚之揲也以十易之占也以動元之占也以逢虚之占也以變是三者固若相戾而不合也及要而語極則實相表裏豈有異哉易之為卦也始於太極太極生兩儀兩儀生四象四象生八卦八八而乗之故極為六十有四焉若之元為首由一以生三由三以生九九九而乗之斯為八十有一焉至虚之為名則始於五行以天之中數五五而乗之為二十有五以地之中數五六而乗之為三十合而言之為五十有五焉然則易之卦元之首虚之名無以異也易之為爻守金木水火而為一分土而為二於是有六爻六六乗之故六十四卦而三百八十四爻具焉若元之為賛則分金木水火而為二守土而為一扵是有九賛九九而乗之故八十一首而七百二十九賛設焉至虚之有變以金木水火土生成之合旋相為宫而生商角徴羽及變宫變徴於是有七變七七而乗之以元餘齊之無變故五十二名三百六十四變生焉易之爻元之賛虚之變無以異也易之爲書也卦有内外以别正悔於是有工體故有以乾爲主而重卦者若徤而說之爲夬是也有以坤爲主而重卦者若順而說之爲萃是也以震爲主若動而說之爲随以巽爲主若巽而說之爲大過皆以其有二體故也若元之爲書則方州部家以别逺近於是有四位焉故一元象辟都覆三方而方者三公之象也方同九州而州者九卿之象也杖載庶部以象大夫分正部家以象元士凢此皆以其有四位故也至虚之為書則體分十等以表尊卑故一等象王二等象公分岳牧率侯卿大夫士庶次為等降先設十純各分其位其次降一王引三公也其名為裒其次降二王引四岳也其名為柔其次降三王引九牧也其名為剛其次降四王引連率也其名為雍凢此皆以其有十等故也合而論之二體四位十等同為卦象而已果且有異乎哉易之為書也始於乾坤而分扵六子扵是有八物焉天地奠位知其為乾坤山澤通氣知其為艮兊雷風相薄震巽以辨水火不相射坎离以濟凢此以其體乎八物故也若元之為書則始於一水終扵五土扵是有五行焉故首性屬水知其為中首性屬火知其為周礥之為首性得天三之木閑之為首性得地四之金少之為首性得天五之土凢此皆以其配五行也至虚之為書始扵天一終扵地十扵是備五行生成之數一六置後自泯至昧二七置前自蠢至考三八置左自容至前四九置右自徒至乂五十分至扵四隅艮昭巽庸坤范乾績各有所隷若此以其備五行生成之數也合而論之八物五行及五行生成之用同扵取象而已果且有異乎哉易次其卦以隂陽消息人事盛衰相受其義元次其首以日之纏次宿之分度以周其數虚次其名以周天之度用三百六十四變變尸一日故易始於乾則以萬物之所資始所謂有天地然後有萬物是也終於未濟則以變故之不可測所謂易不可窮故以未濟終焉是也元始於中則以一元之氣所由基所謂一氣潜萌扵黄鍾信無不在其中是也終扵飬則以一歳之氣所由復所謂星如歳如復継之𥘉是也虚始扵元則以元始也所謂冬至之氣起扵元是也終扵餘則餘終也所謂天地無餘不䏻成變化是也即是推之則卦首名之終始無以異也易之蓍䇿本乎大衍而虚其一元之蓍䇿本乎天地而虚其三虚之蓍䇿本乎五行而虚其五故乾之䇿二百一十有六坤之䇿百四十有四合而計之凢三百有六十以當朞之日衍而積之凢萬有一千五百二十以當萬物之數此易之蓍所以用四十有九也天之數十有八地之數十有八合而計之凢三十有六以律七百二十九賛衍而積之凢二萬六千二百四十四䇿以當歲之日此元之蓍所以用三十有三也五行相乗得二十有五又以三才乗之得七十有五以占五十五名衍而積之凢三千八百五十䇿以成變化之用此虚之蓍所以用七十也即是推之則䇿筭之無窮無以異也分而為二掛一扵指揲之以四㱕竒扵物此則易之揲法也先掛其一半分其餘揲之以三并餘於扐此則元之揲法也分而為二右掛左一揲左以十㱕餘扵扐再分揲右皆如左法此則虚之揲法也易揲以四故取七八九六以定六爻之法元揲以三故取七八九以定四位之畫虚揲以十故取左右生成之數以定合體之名是則揲法之同也七為少陽八為少隂而七八為無變九為老陽六為老隂而九六為有變不變者静而守其位有變者動而有所之此則易之占法也旦筮用經夕筮用緯休則逢陽星時數辤従咎則逢隂星時數辤違此則元之占法也左為主右為客先主後客者陽先客後主者隂陽則用其顯隂則用其幽此則虚之占法也易取其變故以九六而辨其吉㓙元取其逢故以従違而别其休咎虚用其變故以幽顯而辨其否臧是則占法之無以異也夫以首凖卦以名擬首以賛凖爻以變擬賛以四位凖二體以十等擬四位以五行凖八物以生成演五行至於卦首名之相次䇿筭之無窮蓍之數占之法未有不固者自非好古樂道用心於内超然自得於犧易之㫖者孰䏻進此知楊子雲深湛之思司馬君實專精之見皆有以臻大易之奥也氣論五行之在天地間一水二火三木四金五土生數也所謂生數者五行具天地自然之氣也故五行生數各含一隂一陽之性在九疇則五行一曰水二曰火三曰木四曰金五曰土有自然之象也在易則天一地二天三地四天五有自然之數也物生而後有象至滋而後有數則生數一十有五兆於此也天一居北方坎位為水地二居南方离位為火天三居東方震位為木地四居西方兊位為金天五居中而為土在虚則有原有熒有本有卝有基焉至土則本無方隅分王四正之方䏻生萬物故北方水一得土五而成六南方火二得土五而成七東方木三得土五而成八西方金四得土五而成九中央五土合而成十則成數四十成於此也生數一十有五成數四十生成之數五十有五所以具天地終始之道在太虚之中䏻成變化而行鬼神也白虎通曰土可以王四季者何木非土不生火非土不榮金非土不成水非土不髙土扶微助衰歴成其道故五行更生得土以助之所以昔之原者今有委昔之熒者今有焱昔之本者今有末昔之卝者今成刄昔之基者今成冡矣體論天地之數一三五七九陽之竒也故為天之數天秉陽也二四六八十隂之偶也故為地之數地秉隂也隂陽合徳而剛柔有體此五位所以貴乎相得也五位相得而各有合者天一與地六相得合而生水有原而有委地二與天七相得合而生火有熒而有熒天三與地八相得合而生木有本而有末地四與天九相得合而生金有卝而有刃天五與地十相得合而生土有基而有冡以五行生成合而言之則有五以五行生成分而言之則有十故一等象王至十等象庶人緫五十有五體體有左右所以辨賔主也體有上下所以辨尊卑也左為主右為客上為尊下為卑一等象王尊無二上故體之左右純乎一也二等象公下王一等故右純乎二左事王也三等象岳下公一等故右純乎三左事王公也四等象牧下岳一等右純乎四左事王公四岳也五等象率下牧一等右純乎五左事王公岳牧也自一至五皆用五行之生數以興天下之治者也六等象侯下率一等右純乎六左事王公岳牧率也七等象卿下侯一等右純乎七左事公岳牧率侯詘乎一者不及左事王也八等象大夫下卿一等右純乎八左事岳牧率侯卿詘乎二者不及左事王公也九等象士下大夫一等右純乎九左事牧率侯卿大夫詘乎三者不及左事王公四岳也十等象庶人下士一等右純乎十左事率侯卿大夫士詘乎四者不及左事王公岳牧也自不至十皆用五行之成數以成天下之治者也上下相承若此故䏻使天下之大若網在綱若臂使指無末大必折尾大不掉之患矣性論五行之性其相生也不失其為相繼其相克也不失其為相成相繼者四時之次也相成者六府之叙也四時之次金生水而冬承秋水生木而春繼冬木生火而夏繼春皆相生以相繼也六府之修以土治水以水治火而水火為用以火治金以金治木而金木為器以木治土以土治榖而土榖為利此皆相克以相成也虚之合徳雖存二體合為一用大率不出相生相克不失其性故䏻其用無方焉始于十純其體立而不改其次降一故水與火配其次降二故水與木配其次降三故水與金配其次降四故水與土配自降一至降四其下亦降次以相配焉最後五行生成各自爲配皆不出以相生相繼相克以相成是乃五行之性在天地之間未甞或乖且戻也名論周天三百六十五度四分度之一五行生成合體而立名不過五十有五齊扵天地之中包斡萬物故有名而無位冬至之氣起扵元轉而周三百六十四變變尸一日廼授扵餘而終之一六居後在天則斗牛女虚危室壁之分焉三八居左在天則角亢氐房心尾箕之分焉二七居前在天則井鬼栁星張翼軫之分焉四九居右在天則奎婁胃昴畢觜參之分焉自泯至昧十有一名在北而屬水自容至歬十有一名在東而屬木自蠢至考十有一名在南而屬火自徒至乂十有一名在西而屬金昭一土也處報徳之維分王於丑郤庸妥三土也處常陽之維分王於辰范一土也處背陽之維分王扵未績育聲興痡五土也處蹏通之維分王扵戍齊中上也處大中之内在天其北極之任乎變論律吕之生始於黄鍾下生林鍾林鍾上生太蔟太蔟下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生蕤賔蕤賔上生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生中吕陽六為律隂六為吕以黄鍾為宫則林鍾為徴太蔟為啇南吕為羽姑洗為角應鍾為變宫蕤賔為變徴至十二律旋相為宫各以七變而乗之則盡八十四調此聲之元五聲之正也至六十律旋相為宫有執始去减等名終於南事又以七變而乗之則變盡周朞各統一日盡三百六十四變於潛虚之中始於裒之𥘉終於散之上以定天下之吉㓙成天下之亹亹者其用大矣行論五行之在天地之間也非特可以成變化而行鬼神抑亦可以開物成務冒天下以道者也故虚叙人之生本於虚虚然後形形然後性性然後動動然後情情然後事事然後徳徳然後家家然後國國然後政政然後功功然後業是數者其用各有五故終扵五十五名其修為之序可以治性可以修身可以齊家可以治國可以平天下也故虚曰行者人之所務也繋之辭以明其義用之變以尚其占皆所以前民用也命論命者時之所遇也吉㓙否臧雖惟命是遇然禍兮福所倚福兮禍所伏禍福特未定也以其禍福之未定則稽疑之占不可後也元餘齊三者無變皆不占𥘉上者事之始終亦不占所占者自裒至散五十二名以二三四五六之變觀其吉㓙臧否平之所遇而决之陽則用其顯隂則用其幽然後知其吉之大則身其康強子孫其逢吉其次常吉之外或作内吉作外㓙或用静吉用作㓙可以觀變而避就也蓍論虚數七十有五其用七十分二掛一揲之以十先左後右徐觀其餘以命卦名分客主而定隂陽且如裒之一卦丨為主為客左揲先餘一右揲後餘二是先主後客者陽若左揲先餘二右揲後餘一是先客後主者隂由是觀其所合以裒命之旣得其名又合蓍而復分之陽則置右而揲左隂則置左而揲右揲之以七用所揲之餘為所得之變觀其命圖之上吉㓙臧否平而决之陽則用其顯如裒之六吉三㓙不易也隂則用其幽與顯戾也如裒之六吉當爲㓙三㓙當爲吉也假如元蠢容徒齊生數純者不可分隂陽當置右而揲左造考歬乂績成數純者亦不可分隂陽當置左而揲右皆揲之以七以所揲之餘觀其吉㓙臧否平尓右司馬文正公潛虚應行嘗恨建陽書肆所刋脫略至多㡬不可讀及得邵武本雖校正無差而繇辭多闕淳熈九載文正公曾孫待制侍郎出守温陵應行備數芹頖獲忝門下士之列親得公家傳善本繇辭悉備復以張氏發㣲論附之應行再拜以請曰願廣其傳以惠學者公曰是吾志也遂以邵武舊本叅稽互考刻之郡庠使人人得見全書抑何幸耶淳熈壬寅孟冬朔日迪功郎充泉州州學教授陳應行謹䟦附錄錢遵王讀書敏求記一則司馬溫公潛虛一卷張敦實潛虛發微論一卷萬物祖於虛生於氣故有氣圖氣以成體體以受性故有體圖性圖性以辨名名以立行故有名圖行圖行以俟命故以命圖終焉張敦實曰子雲作太玄以明易溫公作潛虛以明玄易之所謂人道者不過乎仁義玄之所謂大訓者不過乎忠孝虛之所謂人之務者不過乎五十五行其立辭命意左右前後橫斜曲直皆有成理因卽其圖各爲總論庶幾學者易覽耳淳熙中陳應行苦此書建陽書肆本脫略不可讀邵武本繇辭多闕從文正公曾孫得家藏稿本附以張氏發微論校刊之洵稱完善矣又鐵琴銅劍樓藏書目錄一則潛虛一卷潛虛發微論一卷影鈔宋本題宋太師溫國公司馬光撰其發微論題左朝奉郎御史張敦實撰昔人見溫公所作潛虛遺墨俱有闕文疑爲未成之書此本完善無闕卽朱子所見泉州本目爲贋本也然當時建陽邵武俱有刻本邵武惟缺繇辭此迺泉州教授陳應行乞諸公曾孫溫陵守某得家藏全本合張氏發微論以刊者云繇辭悉備豈溫公後人所增入者歟抑張氏作發微論時爲之補全耶古人作一書經後人拾遺訂墜者恆多何獨於潛虛而議之也後有應行跋舊爲錢遵王藏書繼歸泰興季氏
